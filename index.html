<!DOCTYPE html>
<html>
<head>

  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-4FB20SQX5B"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-4FB20SQX5B');
  </script>

  <title>Napp Labs</title>
  <link rel="icon" type="image/png" href="favicon.png">

  <style>

    body {
      background-color: black;
      color: #808080;
      font-family: "Roboto", monospace;
      margin: 0;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
      caret-color: transparent;
    }

    .wrapper {
      display: flex;
      flex-direction: column;
      height: 100dvh;
    }

    header {
      display: flex;
      align-items: center;
      padding: 20px;
      gap: 16px;
    }

    .menu {
      color: white;
      font-size: 24px;
      cursor: pointer;
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 20px;
      color: white;
      font-weight: bold;
      letter-spacing: 1px;
    }

    .header-logo {
      width: 28px;
      height: 28px;
      border-radius: 6px;
    }

    .container {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      flex: 1;
      text-align: center;
    }

    .brand {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
    }

    .logo {
      max-width: 120px;
      width: 100%;
      height: auto;
      border-radius: 12px;
    }

    .logo-link {
      display: block;
    }

    .logo-link:hover {
      cursor: pointer;
    }

    .logo-link:active {
      transform: scale(0.96);
    }

    .title {
      margin-top: 12px;
      color: white;
      font-weight: normal;
      letter-spacing: 1px;
    }

    .footer {
      font-size: 12px;
      color: #666666;
      margin-bottom: 10px;
      text-align: center;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

  </style>

</head>

<body>

  <div class="wrapper">

    <header>

      <div class="menu">
        ☰
      </div>

      <div class="header-brand">
        <img src="favicon.png"
             alt="Napp Labs"
             class="header-logo">
        <span>Napp Labs</span>
      </div>

    </header>

    <div class="container">

      <div class="brand">

        <a href="https://play.google.com/store/apps/dev?id=5488493026052360473"
           class="logo-link">

          <img src="logo.png"
               alt="Napp Labs Logo"
               class="logo">

        </a>

        <div class="title">
           Tapp
        </div>

      </div>

    </div>

    <div class="footer" id="copyright"></div>

  </div>

  <script>
    document.getElementById("copyright").textContent =
      "© " + new Date().getFullYear() + " Napp Labs";
  </script>

</body>
</html>
