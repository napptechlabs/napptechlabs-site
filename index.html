<!DOCTYPE html>
<html>
<head>
  <title>Napp Labs</title>
  <link rel="icon" type="image/png" href="favicon.png">

  <style>
    body {
      background-color: black;
      color: #808080;
      font-family: "Courier New", monospace;
      margin: 0;
    }

    .wrapper {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      height: 100vh;
      text-align: center;
    }

    .container {
      display: flex;
      flex-direction: column;
      justify-content: center;
      flex: 1;
      line-height: 1.8;
    }

    .title {
      font-weight: bold;
      color: #ffffff;
    }

    .footer {
      font-size: 12px;
      color: #666;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>
  <div class="wrapper">

    <div class="container">
      <div class="title">Napp Labs</div>
      <div>Minimal apps, thoughtfully built.</div>
    </div>

    <div class="footer" id="copyright"></div>

  </div>

  <script>
    document.getElementById("copyright").textContent =
      "© " + new Date().getFullYear() + " Napp Labs";
  </script>
</body>
</html>
