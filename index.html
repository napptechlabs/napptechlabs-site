<!DOCTYPE html>
<html>
<head>
  <title>Napp Labs</title>
  <link rel="icon" type="image/png" href="favicon.png">

  <style>
    body {
      background-color: black;
      color: #808080;
      font-family: "Courier New", monospace;
      margin: 0;
    }

    .wrapper {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      height: 100dvh;
      text-align: center;
    }

    .container {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      flex: 1;
      line-height: 1.8;
    }
    
    .brand {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
    }

    .logo {
      max-width: 120px;  
      width: 100%;
      height: auto;
      border-radius: 12px;
    }

    .logo-link {
      display: block;
    }

    .logo-link:hover {
      cursor: pointer;
    }

    .logo-link:active {
      transform: scale(0.96);
    }

    .title {
      font-weight: bold;
      color: #ffffff;
      letter-spacing: 1px;
      display: inline-block;
    }

    .footer {
      font-size: 12px;
      color: #666;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>
  <div class="wrapper">

    <div class="container">

      <div class="brand">
        <a href="https://play.google.com/store/apps/dev?id=5488493026052360473" class="logo-link">
          <img src="logo.png" alt="Napp Labs Logo" class="logo">
        </a>

        <div class="title">Napp Labs</div>
      </div>

      <div>Minimal apps, thoughtfully built.</div>

    </div>

    <div class="footer" id="copyright"></div>

  </div>

  <script>
    document.getElementById("copyright").textContent =
      "© " + new Date().getFullYear() + " Napp Labs";
  </script>
</body>
</html>
